<div
  class="contact-container max-w-9xl mx-auto p-6 pb-24 bg-sky-50 grid grid-cols-1 md:grid-cols-3 gap-8"
>
  <div class="contact-info mt-8 grid grid-cols-1 gap-4">
    <div class="info-box bg-white p-4 rounded-lg shadow-md">
      <h2 class="text-lg font-semibold text-gray-800">Phone</h2>
      <p class="text-gray-700">+91 83444-52066</p>
    </div>
    <div class="info-box bg-white p-4 rounded-lg shadow-md">
      <h2 class="text-lg font-semibold text-gray-800">Email</h2>
      <p class="text-gray-700">somasundar.work&#64;outlook.com</p>
    </div>
    <div class="info-box bg-white p-4 rounded-lg shadow-md">
      <h2 class="text-lg font-semibold text-gray-800">LinkedIn</h2>
      <p class="text-sky-600 underline">
        <a
          href="https://www.linkedin.com/in/somasundar-work/"
          target="_blank"
          rel="noopener noreferrer"
        >
          somasundar-work
        </a>
      </p>
    </div>
  </div>

  <div class="form-section mt-8 bg-white p-6 rounded-lg shadow-md col-span-2">
    <h1 class="text-3xl font-bold text-center text-gray-800 mb-6">Contact Me</h1>
    <form class="space-y-4">
      <div class="flex gap-4">
        <div class="form-group w-1/2">
          <label for="name" class="block text-sm font-medium text-gray-700">Name:</label>
          <input
            type="text"
            id="name"
            name="name"
            placeholder="Enter your name"
            required
            class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-md shadow-sm focus:ring-sky-500 focus:border-sky-500"
          />
        </div>
        <div class="form-group w-1/2">
          <label for="email" class="block text-sm font-medium text-gray-700">Email:</label>
          <input
            type="email"
            id="email"
            name="email"
            placeholder="Enter your email"
            required
            class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-md shadow-sm focus:ring-sky-500 focus:border-sky-500"
          />
        </div>
      </div>
      <div class="form-group">
        <label for="message" class="block text-sm font-medium text-gray-700">Message:</label>
        <textarea
          id="message"
          name="message"
          placeholder="Enter your message"
          rows="5"
          required
          class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-md shadow-sm focus:ring-sky-500 focus:border-sky-500"
        ></textarea>
      </div>
      <div class="flex justify-end">
        <button
          type="submit"
          class="bg-sky-600 w-2/12 cursor-pointer hover:text-sky-600 text-white py-2 px-4 rounded-md hover:bg-white border-2 focus:ring-sky-600 focus:ring-2 focus:ring-offset-2"
        >
          Send Message
        </button>
      </div>
    </form>
  </div>
</div>
